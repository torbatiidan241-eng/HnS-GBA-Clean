name: Build ROM
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev libelf-dev zlib1g-dev

      - name: Install agbcc
        run: |
          git clone https://github.com/pret/agbcc
          cd agbcc
          ./build.sh
          ./install.sh ../
          cd ..

      - name: Build ROM
        run: make -j$(nproc) WERROR=0
      
      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokedust-rom
          path: "*.gba"
