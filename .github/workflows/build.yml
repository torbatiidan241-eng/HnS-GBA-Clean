name: CI
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev git wget python3
          git clone --depth=1 https://github.com/pret/agbcc
          cd agbcc && ./build.sh && ./install.sh ../ && cd ..

      - name: Build ROM
        run: |
          # Go directly to the project folder
          cd HnS-GBA-Clean
          
          # Build the tools
          make -C tools -j$(nproc)
          
          # Create dummy baserom and build the game
          touch baserom.gba
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HnS-Final-ROM
          path: "HnS-GBA-Clean/*.gba"
