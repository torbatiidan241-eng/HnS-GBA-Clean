name: CI
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev git wget python3
          git clone --depth=1 https://github.com/pret/agbcc
          cd agbcc && ./build.sh && ./install.sh ../ && cd ..

      - name: Build ROM
        run: |
          # 1. Search for where the Makefile is and move there
          SUBFOLDER=$(find . -maxdepth 2 -name "Makefile" -exec dirname {} \;)
          cd $SUBFOLDER
          echo "Moving to project directory: $SUBFOLDER"
          
          # 2. Start the build
          touch baserom.gba
          make -C tools -j$(nproc)
          make -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HnS-Final-ROM
          path: "**/*.gba"
