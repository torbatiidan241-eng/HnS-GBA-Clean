name: CI
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev git wget python3
          git clone --depth=1 https://github.com/pret/agbcc
          cd agbcc && ./build.sh && ./install.sh ../ && cd ..

      - name: Build ROM
        run: |
          # This line moves the computer into the correct folder
          cd HnS-GBA-Clean
          
          # Now it will find the Makefile and the tools!
          touch baserom.gba
          make -C tools -j$(nproc)
          make -j$(nproc)
